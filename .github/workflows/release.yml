name: release

# One tag, one release, one standalone package per tool.
# Push a `v<version>` tag (e.g. `v0.1.0`) and this builds every binary crate
# under crates/ and attaches each as its own <tool>-<target>.tar.gz asset
# to a single GitHub Release. New tools are picked up automatically — no
# workflow changes needed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-14      # Apple Silicon → aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build & package all tools
        run: |
          cargo build --release --locked
          dist="$GITHUB_WORKSPACE/dist"
          mkdir -p "$dist"
          for manifest in crates/*/Cargo.toml; do
            grep -q '^\[\[bin\]\]' "$manifest" || continue   # skip library crates (e.g. common)
            tool="$(basename "$(dirname "$manifest")")"
            tar -czf "$dist/$tool-aarch64-apple-darwin.tar.gz" -C target/release "$tool"
            echo "packaged $tool"
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
